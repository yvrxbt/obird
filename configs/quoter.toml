# HL Spread Quoter — mainnet live config
# Secrets (HL_SECRET_KEY) stay in .env, never here.
# Set HL_SYMBOL in .env to match the instrument below.

[engine]
tick_interval_ms = 100

[[exchanges]]
name = "hyperliquid"
# api_key_env unused for HL (private key is sufficient)
api_key_env = ""
secret_key_env = "HL_SECRET_KEY"
testnet = false            # ← mainnet

[[strategies]]
name = "hl_quoter_v1"
strategy_type = "hl_spread_quoter"
# Must match HL_SYMBOL in .env exactly — perp name (e.g. "ETH") or spot base (e.g. "PURR")
instruments = ["Hyperliquid.Perpetual.ETH"]

[strategies.params]
# Quote two levels on each side. Total 4 resting orders.
# ETH perp szDecimals=4, min size=0.0001. Using 0.01 to start.
level_bps        = [50, 100]       # each level's half-spread in bps
order_size       = "0.05"        # size per level per side

# Pull all quotes if mid drifts more than this many bps from last quoted mid.
# With level_bps=[50,100], a 3 bps mid move barely affects order quality — the
# orders are still 47-97 bps from mid. Use 15 bps so we only cancel when the market
# has actually moved enough to matter. This cuts request rate ~5× vs drift_bps=3.
drift_bps        = 15
drift_pause_secs = 5             # seconds to wait before requoting after drift

# After a fill on any level, pause this many seconds before requoting
fill_pause_secs  = 10

# Max net position before stopping new orders on the accumulating side
max_position     = "0.1"

# Inventory skew — shifts reservation mid by (net_position * skew_factor) bps.
# At max_position (0.1 ETH long), shifts mid down 5 bps → ask is 5 bps cheaper,
# steering sells without explicitly widening spread. Set to 0 to disable.
# Calibration: skew at max_position should ≈ one spread width (5–10 bps here).
skew_factor_bps_per_unit = "50"  # 50 bps per unit → 5 bps shift at 0.1 ETH

# HL mainnet maker rebate is +0.2 bps (negative fee). Taker is +2.5 bps.
# Post-only orders should always be maker. Set to actual fee for P&L accuracy.
taker_fee_bps    = "0.2"         # maker rebate (negative taker) for post-only orders

[telemetry]
log_level     = "info"
metrics_port  = 9090
enable_tracing = false
